name: Tests

on: [push, pull_request]

jobs:
  Tests-Ubuntu2204:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Install packages
      run: |
        # Install the desired compilers.
        sudo apt install -y g++-12
        sudo apt autoremove -y g++-11 g++-10
    - name: List compilers
      run: make -pq | grep ^COMPILER
    - name: Run tests
      run: make
  Tests-Ubuntu2404:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Install packages
      run: |
        # Install the desired compilers.
        sudo apt install -y g++-14
    - name: List compilers
      run: make -pq | grep ^COMPILER
    - name: Run tests
      # Clang 17 chokes on our code when using libstdc++ 13.
      run: make CXXFLAGS_PER_COMPILER='clang++-17=--gcc-install-dir=/usr/lib/gcc/x86_64-linux-gnu/13'
  Tests-MSVC:
    runs-on: windows-latest
    steps:
    - name: Locate MSVC
      uses: ilammy/msvc-dev-cmd@v1
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: make
        path-type: inherit
    - name: Checkout
      uses: actions/checkout@v3
    - name: Run tests
      run: |
        make COMPILER='cl clang-cl'
      shell: msys2 {0}
